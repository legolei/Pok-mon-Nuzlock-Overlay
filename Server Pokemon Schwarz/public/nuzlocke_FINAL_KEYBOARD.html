const statuses = ["","Lebendig","Tot","Blockiert"];

function statHtml() {
  return `<select class="statusSel">${statuses.map(s=>`<option>${s}</option>`).join("")}</select>`;
}

function applyStatusColor(el) {
  const tdS = el.parentElement;
  const tdP = tdS ? tdS.previousElementSibling : null;
  ["alive","dead","blocked"].forEach(c => {
    tdS.classList.remove(c);
    if (tdP) tdP.classList.remove(c);
  });
  if (el.value === "Lebendig") { tdS.classList.add("alive");   if (tdP) tdP.classList.add("alive"); }
  if (el.value === "Tot")      { tdS.classList.add("dead");    if (tdP) tdP.classList.add("dead"); }
  if (el.value === "Blockiert"){ tdS.classList.add("blocked"); if (tdP) tdP.classList.add("blocked"); }
}

(function buildTable() {
  let h = "";

  h += `<tr><th></th>`;
  for (let p = 1; p <= PLAYERS; p++) h += `<th colspan=2>Spieler ${p}</th>`;
  h += `</tr><tr><td></td>`;
  for (let p = 1; p <= PLAYERS; p++) h += `<td>Pok&eacute;mon</td><td>Status</td>`;
  h += `</tr>`;

  for (let s = 1; s <= TEAM_SLOTS; s++) {
    h += `<tr class="teamRow"><td class="route">Team Slot ${s}</td>`;
    for (let p = 1; p <= PLAYERS; p++) {
      h += `<td><select class="teamSel" style="width:100%"><option value=""></option></select></td>`;
      h += `<td>${statHtml()}</td>`;
    }
    h += `</tr>`;
  }

  h += `<tr><th>Route</th>`;
  for (let p = 1; p <= PLAYERS; p++) h += `<th colspan=2>Spieler ${p}</th>`;
  h += `</tr><tr><td></td>`;
  for (let p = 1; p <= PLAYERS; p++) h += `<td>Pok&eacute;mon</td><td>Status</td>`;
  h += `</tr>`;

  routes.forEach(r => {
    h += `<tr><td class="route">${r}</td>`;
    for (let p = 1; p <= PLAYERS; p++) {
      h += `<td><select class="pokeSel">${pokemon.map(n=>`<option>${n}</option>`).join("")}</select></td>`;
      h += `<td>${statHtml()}</td>`;
    }
    h += `</tr>`;
  });

  for (let i = 1; i <= 8; i++) {
    h += `<tr><td class="route">Statik ${i}</td>`;
    for (let p = 1; p <= PLAYERS; p++) {
      h += `<td><select class="pokeSel">${pokemon.map(n=>`<option>${n}</option>`).join("")}</select></td>`;
      h += `<td>${statHtml()}</td>`;
    }
    h += `</tr>`;
  }

  document.getElementById("app").innerHTML = h;
})();

(function convertInputs() {
  document.querySelectorAll("#app tr:not(.teamRow) td").forEach(td => {
    if (td.cellIndex % 2 !== 1) return;
    const select = td.querySelector("select.pokeSel");
    if (!select) return;

    let activeIndex = -1;

    const input = document.createElement("input");
    input.type = "text";
    input.autocomplete = "off";
    input.style.cssText = "width:100%;box-sizing:border-box;border:none;background:transparent;text-align:center;font-size:inherit;";

    const drop = document.createElement("div");
    drop.style.cssText = "position:absolute;top:100%;left:0;right:0;background:white;border:1px solid #999;max-height:120px;overflow-y:auto;display:none;z-index:999;";

    function updateActive() {
      drop.querySelectorAll("div").forEach((el, i) => {
        el.style.background = (i === activeIndex) ? "#3399ff" : "";
        el.style.color      = (i === activeIndex) ? "white"   : "";
      });
    }

    function selectItem(name) {
      input.value = name;
      drop.style.display = "none";
      activeIndex = -1;
      updateTeam();
      sendToOverlay();
    }

    input.addEventListener("input", () => {
      const val = input.value.toLowerCase();
      drop.innerHTML = "";
      activeIndex = -1;
      if (!val) { drop.style.display = "none"; updateTeam(); sendToOverlay(); return; }

      let count = 0;
      for (const name of pokemon) {
        if (!name.toLowerCase().startsWith(val)) continue;
        const item = document.createElement("div");
        item.textContent = name;
        item.style.cssText = "padding:4px 6px;cursor:pointer;";
        item.addEventListener("mousedown", e => { e.preventDefault(); selectItem(name); });
        drop.appendChild(item);
        if (++count >= 10) break;
      }
      drop.style.display = count ? "block" : "none";
      updateTeam();
      sendToOverlay();
    });

    input.addEventListener("keydown", e => {
      const items = drop.querySelectorAll("div");
      if (!items.length || drop.style.display === "none") return;
      if (e.key === "ArrowDown") {
        e.preventDefault();
        activeIndex = Math.min(activeIndex + 1, items.length - 1);
        updateActive();
      } else if (e.key === "ArrowUp") {
        e.preventDefault();
        activeIndex = Math.max(0, activeIndex - 1);
        updateActive();
      } else if (e.key === "Enter" && activeIndex >= 0) {
        e.preventDefault();
        selectItem(items[activeIndex].textContent);
      }
    });

    input.addEventListener("blur", () => {
      setTimeout(() => { drop.style.display = "none"; }, 150);
      updateTeam();
      sendToOverlay();
    });

    td.style.position = "relative";
    td.innerHTML = "";
    td.appendChild(input);
    td.appendChild(drop);
  });
})();

function updateTeam() {
  const alive = Array.from({ length: PLAYERS }, () => []);

  document.querySelectorAll("#app tr:not(.teamRow)").forEach(row => {
    const cells = row.querySelectorAll("td");
    for (let p = 0; p < PLAYERS; p++) {
      const pokeCell   = cells[1 + p * 2];
      const statusCell = cells[2 + p * 2];
      if (!pokeCell || !statusCell) continue;
      const input  = pokeCell.querySelector("input");
      const name   = input ? input.value.trim() : "";
      const status = statusCell.querySelector("select")?.value || "";
      if (name && status === "Lebendig" && !alive[p].includes(name)) {
        alive[p].push(name);
      }
    }
  });

  document.querySelectorAll("#app tr.teamRow").forEach(row => {
    const cells = row.querySelectorAll("td");
    for (let p = 0; p < PLAYERS; p++) {
      const cell = cells[1 + p * 2];
      if (!cell) continue;
      const sel = cell.querySelector("select.teamSel");
      if (!sel) continue;
      const cur = sel.value;
      sel.innerHTML = `<option value=""></option>${alive[p].map(n=>`<option>${n}</option>`).join("")}`;
      sel.value = alive[p].includes(cur) ? cur : "";
    }
  });
}

function sendToOverlay() {
  const data = {};

  document.querySelectorAll("#app tr.teamRow").forEach(row => {
    const match = row.querySelector("td.route")?.textContent.match(/\d+/);
    if (!match) return;
    const slot  = parseInt(match[0]);
    const cells = row.querySelectorAll("td");

    for (let p = 0; p < PLAYERS; p++) {
      const pokeCell   = cells[1 + p * 2];
      const statusCell = cells[2 + p * 2];
      if (!pokeCell || !statusCell) continue;
      const name   = pokeCell.querySelector("select.teamSel")?.value || "";
      const status = statusCell.querySelector("select.statusSel")?.value || "";
      if (!data[p + 1]) data[p + 1] = [];
      const idx = (name && status === "Lebendig") ? pokemon.indexOf(name) : 0;
      data[p + 1][slot - 1] = (idx > 0) ? idx : 0;
    }
  });

  window.parent.postMessage({ type: "TEAM_UPDATE", payload: data }, "*");
}

document.getElementById("app").addEventListener("change", (e) => {
  if (e.target.classList.contains("statusSel")) {
    applyStatusColor(e.target);
  }
  updateTeam();
  sendToOverlay();
});
</script>
